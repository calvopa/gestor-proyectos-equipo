services:
  gestor:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    volumes:
      - gestor-data:/data
    environment:
      - PORT=${PORT:-3000}
      - DB_PATH=/data/gestor.sqlite
      - CLICKUP_TOKEN=${CLICKUP_TOKEN:-}
      - CLICKUP_TEAM_ID=${CLICKUP_TEAM_ID:-}
      - SYNC_INTERVAL_MIN=${SYNC_INTERVAL_MIN:-30}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${PORT:-3000}/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  gestor-data:
    name: gestor-proyectos-data
